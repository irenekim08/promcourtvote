<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prom Court Voting</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');

body {
  font-family: 'Playfair Display', serif;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: #f5e6c8;
  margin: 0;
  padding: 20px 0;
}

.gold { color: #d4af37; }

.envelope {
  z-index: 1;
  width: 80vw;
  max-width: 320px;
  height: 50vw;
  max-height: 200px;
  background: linear-gradient(145deg, #e8d8a8, #d6c089);
  position: relative;
  border-radius: 6px;
  box-shadow: 0 0 40px rgba(212,175,55,0.25);
  margin: -40px auto 0 auto; /* sits under letter */
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 50%;
  background: linear-gradient(145deg, #d9c48a, #cbb070);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 1s ease;
}

.open .flap { transform: rotateX(180deg); }

.seal {
  width: 18vw;
  max-width: 60px;
  height: 18vw;
  max-height: 60px;
  border-radius: 50%;
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  background: radial-gradient(circle at 30% 30%, #fff3b0, #d4af37 40%, #a67c00 75%, #6b4f00);
  box-shadow: inset -4px -6px 10px rgba(0,0,0,0.4), inset 4px 4px 8px rgba(255,255,255,0.4), 0 0 15px rgba(212,175,55,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.25s ease;
}

.seal::before {
  content: "♛";
  font-size: 22px;
  color: rgba(0,0,0,0.7);
}

.seal:active {
  transform: translate(-50%, -50%) scale(1.2);
}

.crack { animation: crack 0.5s forwards; }

@keyframes crack {
  50% { transform: translate(-50%, -50%) scale(1.3) rotate(8deg); }
  100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
}

.letter {
  position: relative;
  z-index: 2;
  background: #fdf6e3;
  color: #1a1a1a;
  padding: 5vw;
  border-radius: 10px;
  max-width: 90vw;
  margin: 0 auto;
  display: none;
  box-shadow: 0 0 50px rgba(212,175,55,0.2);
  transform: translateY(50px);
}

.show-letter {
  display: block;
  animation: slideUp 1s ease forwards;
}

@keyframes slideUp {
  to { transform: translateY(0); opacity: 1; }
}

input { border-bottom: 1px solid #d4af37; background: transparent; }
button:hover { box-shadow: 0 0 15px #d4af37; }

</style>
</head>

<body>

<!-- LETTER FIRST -->
<div id="letter" class="letter">
  <h1 class="text-3xl mb-4 gold text-center">An Invitation to Vote</h1>

  <p class="mb-4">Esteemed Guest,</p>
  <p class="mb-6">You are cordially invited to cast your vote for this year's Prom Court.</p>

  <form id="voteForm" action="https://docs.google.com/forms/d/e/1FAIpQLScExsky7uQSMPfgYknKsKbwNzPp2uGIiPo8frwwQx0FDUC7hQ/formResponse">

    <input type="hidden" name="submit" value="Submit">

    <div class="mb-6">
      <label>Name:</label><br>
      <input type="text" name="entry.299242863" required class="w-full" />
    </div>

    <div class="text-center mt-8">
      <button type="submit" class="px-6 py-2 bg-black text-white rounded-full border border-yellow-500">
        Seal & Send ✉️
      </button>
    </div>
  </form>

  <p id="error" class="text-red-600 mt-4 hidden text-center">You may only select up to 2 per category.</p>
</div>

<!-- ENVELOPE BELOW -->
<div id="envelope" class="envelope relative">
  <div class="flap"></div>
  <div id="seal" class="seal"></div>
</div>

<script>
const seal = document.getElementById('seal');
const envelope = document.getElementById('envelope');
const letter = document.getElementById('letter');

seal.addEventListener('click', () => {
  seal.classList.add('crack');
  envelope.classList.add('open');

  setTimeout(() => {
    letter.classList.add('show-letter');
  }, 700);
});
</script>

</body>
</html>
