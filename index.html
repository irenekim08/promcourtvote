<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prom Court Voting</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');

body {
  font-family: 'Playfair Display', serif;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: #f5e6c8;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

.gold { color: #d4af37; }

/* ENVELOPE */
.envelope {
  width: 80vw;
  max-width: 320px;
  height: 50vw;
  max-height: 200px;
  background: linear-gradient(145deg, #e8d8a8, #d6c089);
  position: relative;
  border-radius: 6px;
  box-shadow: 0 0 40px rgba(212,175,55,0.25);
  margin: 2rem auto;
}

/* FLAP */
.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 25vw;
  max-height: 100px;
  background: linear-gradient(145deg, #d9c48a, #cbb070);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 1s ease;
}

.open .flap { transform: rotateX(180deg); }

/* SEAL */
.seal {
  width: 15vw;
  max-width: 60px;
  height: 15vw;
  max-height: 60px;
  border-radius: 50%;
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  background: radial-gradient(circle at 30% 30%, #fff3b0, #d4af37 40%, #a67c00 75%, #6b4f00);
  box-shadow: inset -4px -6px 10px rgba(0,0,0,0.4), inset 4px 4px 8px rgba(255,255,255,0.4), 0 0 15px rgba(212,175,55,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.25s ease;
  touch-action: manipulation;
}

.seal::before {
  content: "♛";
  font-size: 8vw;
  max-font-size: 22px;
  color: rgba(0,0,0,0.7);
}

/* TOUCH-friendly scaling */
.seal:active {
  transform: translate(-50%, -50%) scale(1.2);
}

/* CRACK */
.crack { animation: crack 0.5s forwards; }
@keyframes crack {
  50% { transform: translate(-50%, -50%) scale(1.3) rotate(8deg); }
  100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
}

/* LETTER */
.letter {
  background: #fdf6e3;
  color: #1a1a1a;
  padding: 5vw;
  border-radius: 10px;
  max-width: 90vw;
  margin: 2rem auto;
  display: none;
  box-shadow: 0 0 50px rgba(212,175,55,0.2);
  transform: translateY(50px);
  font-size: 4vw;
}

.show-letter { display: block; animation: slideUp 1s ease forwards; }
@keyframes slideUp { to { transform: translateY(0); opacity: 1; } }

/* INPUTS & BUTTONS */
input, button {
  font-size: 4vw;
}
input { border-bottom: 1px solid #d4af37; background: transparent; width: 100%; padding: 1vw 0; }
button {
  padding: 2vw 4vw;
}
button:hover { box-shadow: 0 0 15px #d4af37; }

/* ERROR/CONFIRMATION */
#error, #confirmation {
  font-size: 4vw;
  margin-top: 2vw;
  text-align: center;
}
</style>
</head>

<body>

<div id="envelope" class="envelope relative">
  <div class="flap"></div>
  <div id="seal" class="seal"></div>
</div>

<div id="letter" class="letter">
  <h1 class="text-3xl mb-4 gold text-center">An Invitation to Vote</h1>
  <p class="mb-4">Esteemed Guest,</p>
  <p class="mb-6">You are cordially invited to cast your vote for this year's Prom Court.</p>

  <!-- GOOGLE FORM (hidden submission via iframe for mobile) -->
  <form id="voteForm" action="https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse" method="POST" target="hidden_iframe">
    <input type="hidden" name="submit" value="Submit">

    <div class="mb-6">
      <label>Name:</label><br>
      <input type="text" name="entry.299242863" required>
    </div>

    <div class="mb-6">
      <label>Junior Prom Court (max 2):</label><br>
      <input type="checkbox" class="junior" name="entry.1881069584" value="Option 1"> Option 1<br>
      <input type="checkbox" class="junior" name="entry.1881069584" value="Option 2"> Option 2<br>
    </div>

    <div class="mb-6">
      <label>Senior Prom Court (max 2):</label><br>
      <input type="checkbox" class="senior" name="entry.1457775683" value="Option 1"> Option 1<br>
      <input type="checkbox" class="senior" name="entry.1457775683" value="Option 2"> Option 2<br>
    </div>

    <div class="text-center mt-8">
      <button type="submit" class="px-6 py-2 bg-black text-white rounded-full border border-yellow-500">
        Seal & Send ✉️
      </button>
    </div>
  </form>

  <iframe name="hidden_iframe" style="display:none;"></iframe>
  <p id="error" class="text-red-600 hidden">You may only select up to 2 per category.</p>
  <p id="confirmation" class="text-green-700 hidden">Your vote has been sealed ✨</p>
</div>

<script>
const seal = document.getElementById('seal');
const envelope = document.getElementById('envelope');
const letter = document.getElementById('letter');

seal.addEventListener('click', () => {
  seal.classList.add('crack');
  envelope.classList.add('open');
  setTimeout(() => { letter.classList.add('show-letter'); }, 700);
});

// Limit max 2 per category
function limitCheckboxes(className) {
  const boxes = document.querySelectorAll('.' + className);
  boxes.forEach(box => {
    box.addEventListener('change', () => {
      const checked = document.querySelectorAll('.' + className + ':checked');
      if (checked.length > 2) {
        box.checked = false;
        document.getElementById('error').classList.remove('hidden');
      } else {
        document.getElementById('error').classList.add('hidden');
      }
    });
  });
}
limitCheckboxes('junior');
limitCheckboxes('senior');

// Show confirmation after submission
document.getElementById('voteForm').addEventListener('submit', () => {
  setTimeout(() => {
    document.getElementById('confirmation').classList.remove('hidden');
  }, 500);
});
</script>

</body>
</html>
