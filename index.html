<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');

body {
  font-family: 'Playfair Display', serif;
  color: #f5e6c8;
  margin: 0;
  padding: 0;
  overflow-x: hidden;

  /* FIXED, full-screen gradient */
  background: radial-gradient(circle at 20% 0%, #2a2a2a, #000 70%);
  background-attachment: fixed;
  min-height: 100vh;
}

.gold { color: #d4af37; }

.envelope {
  width: 80vw;
  max-width: 320px;
  height: 50vw;
  max-height: 200px;
  background: linear-gradient(145deg, #e8d8a8, #d6c089);
  position: relative;
  border-radius: 6px;
  box-shadow: 0 0 40px rgba(212,175,55,0.25);
  margin: 2rem auto;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 25vw;
  max-height: 100px;
  background: linear-gradient(145deg, #d9c48a, #cbb070);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 1s ease;
}

.open .flap { transform: rotateX(180deg); }

.seal {
  width: 15vw;
  max-width: 60px;
  height: 15vw;
  max-height: 60px;
  border-radius: 50%;
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  background: radial-gradient(circle at 30% 30%, #fff3b0, #d4af37 40%, #a67c00 75%, #6b4f00);
  box-shadow: inset -4px -6px 10px rgba(0,0,0,0.4),
              inset 4px 4px 8px rgba(255,255,255,0.4),
              0 0 15px rgba(212,175,55,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.25s ease;
}

.seal::before {
  content: "♛";
  font-size: 8vw;
  color: rgba(0,0,0,0.7);
}

.seal:active {
  transform: translate(-50%, -50%) scale(1.2);
}

.crack { animation: crack 0.5s forwards; }

@keyframes crack {
  50% { transform: translate(-50%, -50%) scale(1.3) rotate(8deg); }
  100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
}

.letter {
  background: #fdf6e3;
  color: #1a1a1a;
  padding: 5vw;
  border-radius: 10px;
  max-width: 90vw;
  margin: 2rem auto;
  display: none;
  box-shadow: 0 0 50px rgba(212,175,55,0.2);
  transform: translateY(50px);
  font-size: 4vw;
}

.show-letter {
  display: block;
  animation: slideUp 1s ease forwards;
}

@keyframes slideUp {
  to { transform: translateY(0); opacity: 1; }
}

input, button { font-size: 4vw; }

input[type="text"] {
  border-bottom: 1px solid #d4af37;
  background: transparent;
  width: 100%;
  padding: 1vw 0;
}

label input[type="checkbox"] {
  transform: scale(1.2);
}

label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 15px #d4af37;
}

#error {
  font-size: 4vw;
  margin-top: 2vw;
  text-align: center;
}
</style>

<script>
const seal = document.getElementById('seal');
const envelope = document.getElementById('envelope');
const letter = document.getElementById('letter');

seal.addEventListener('click', () => {
  seal.classList.add('crack');
  envelope.classList.add('open');
  setTimeout(() => {
    letter.classList.add('show-letter');
  }, 700);
});

function limitCheckboxes(className) {
  const boxes = document.querySelectorAll('.' + className);
  boxes.forEach(box => {
    box.addEventListener('change', () => {
      const checked = document.querySelectorAll('.' + className + ':checked');
      if (checked.length > 2) {
        box.checked = false;
        document.getElementById('error').classList.remove('hidden');
      }
    });
  });
}

limitCheckboxes('junior');
limitCheckboxes('senior');
</script>
